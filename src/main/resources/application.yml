spring:
  application:
    name: pokemon-amethyst

  # Banco: use variáveis de ambiente para Supabase/Neon (veja README) ou deixe em branco para localhost.
  # Em planos com limite baixo de conexões (ex.: Neon Session mode), use pool pequeno para evitar "max clients reached".
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/pokemon_amethyst}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${SPRING_DATASOURCE_POOL_SIZE:3}
      minimum-idle: ${SPRING_DATASOURCE_POOL_MIN_IDLE:1}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        default_schema: public
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true

server:
  port: 8080
  servlet:
    context-path: /
